pre-commit:
  parallel: false
  commands:
    web-format:
      root: apps/web
      run: pnpm format
      stage_fixed: true
    web-lint:
      root: apps/web
      run: pnpm lint
    api-format:
      root: services/api
      run: pnpm format
      stage_fixed: true
    api-lint:
      root: services/api
      run: pnpm lint
    proto-format:
      glob: "proto/**/*.proto"
      run: pnpm proto:format
      stage_fixed: true
    proto-lint:
      glob: "proto/**/*.proto"
      run: pnpm proto:lint

pre-push:
  commands:
    verify:
      glob: "{apps,services,packages,gen}/**/*,package.json,pnpm-lock.yaml"
      run: pnpm format:check && pnpm lint && pnpm test && pnpm build
    proto-check:
      glob: "proto/**/*.proto"
      run: pnpm proto:build && pnpm proto:gen && git diff --exit-code gen/
