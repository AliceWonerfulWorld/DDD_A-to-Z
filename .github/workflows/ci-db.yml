name: CI DB

permissions:
  contents: read
  actions: read

on:
  pull_request:
    paths:
      - ".github/workflows/ci-db.yml"
      - ".github/workflows/deploy.yml"
      - "atlas.hcl"
      - "db/**"
      - "services/api/**"
      - "services/chat/**"
      - "proto/**"
      - "gen/go/**"
      - "package.json"
      - "scripts/atlas.sh"
      - "flake.lock"
      - "flake.nix"
      - "go.work"
      - "go.work.sum"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-db.yml"
      - ".github/workflows/deploy.yml"
      - "atlas.hcl"
      - "db/**"
      - "services/api/**"
      - "services/chat/**"
      - "proto/**"
      - "gen/go/**"
      - "package.json"
      - "scripts/atlas.sh"
      - "flake.lock"
      - "flake.nix"
      - "go.work"
      - "go.work.sum"

jobs:
  db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Validate schema source
        run: nix develop -c ./scripts/atlas.sh schema inspect --env ci --url env://src --format '{{ sql . }}' > /dev/null

      - name: Validate migrations
        run: nix develop -c ./scripts/atlas.sh migrate validate --env ci

      - name: Lint migrations
        run: nix develop -c ./scripts/atlas.sh migrate lint --env ci

      - name: Test migrations against ephemeral DB
        env:
          CI_DATABASE_URL: postgres://atlas:atlas@localhost:5432/atlas?search_path=public&sslmode=disable
        run: nix develop -c ./scripts/atlas.sh migrate apply --env ci
