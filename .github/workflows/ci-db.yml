name: CI DB

permissions:
  contents: read
  actions: read

on:
  pull_request:
    paths:
      - ".github/workflows/ci-db.yml"
      - ".github/workflows/deploy.yml"
      - "atlas.hcl"
      - "db/**"
      - "services/api/**"
      - "services/chat/**"
      - "proto/**"
      - "gen/go/**"
      - "package.json"
      - "scripts/atlas.sh"
      - "flake.lock"
      - "flake.nix"
      - "go.work"
      - "go.work.sum"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-db.yml"
      - ".github/workflows/deploy.yml"
      - "atlas.hcl"
      - "db/**"
      - "services/api/**"
      - "services/chat/**"
      - "proto/**"
      - "gen/go/**"
      - "package.json"
      - "scripts/atlas.sh"
      - "flake.lock"
      - "flake.nix"
      - "go.work"
      - "go.work.sum"

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Validate schema source
        run: nix develop -c ./scripts/atlas.sh schema inspect --env ci --url env://src --format '{{ sql . }}' > /dev/null

      - name: Validate migrations
        run: nix develop -c ./scripts/atlas.sh migrate validate --env ci

      - name: Lint migrations
        run: nix develop -c ./scripts/atlas.sh migrate lint --env ci

      - name: Install official Atlas CLI
        run: curl -sSf https://atlasgo.sh | sh

      - name: Dry-run migrations
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          case "$NEON_DATABASE_URL" in
            *\?*) export NEON_DATABASE_URL="${NEON_DATABASE_URL}&statement_cache_capacity=0" ;;
            *)    export NEON_DATABASE_URL="${NEON_DATABASE_URL}?statement_cache_capacity=0" ;;
          esac
          atlas migrate apply --env prod --dry-run --tx-mode=no-tx --config file://atlas.hcl

